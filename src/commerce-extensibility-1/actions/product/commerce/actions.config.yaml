upsert:
  function: upsert/index.js
  web: 'no'
  runtime: nodejs:24
  inputs:
    LOG_LEVEL: $LOG_LEVEL
    ENABLE_TELEMETRY: true
  annotations:
    final: true
created:
  function: created/index.js
  web: 'no'
  runtime: nodejs:24
  inputs:
    LOG_LEVEL: $LOG_LEVEL
  annotations:
    final: true
updated:
  function: updated/index.js
  web: 'no'
  runtime: nodejs:24
  inputs:
    LOG_LEVEL: $LOG_LEVEL
  annotations:
    final: true
deleted:
  function: deleted/index.js
  web: 'no'
  runtime: nodejs:24
  inputs:
    LOG_LEVEL: $LOG_LEVEL
  annotations:
    final: true
full-sync:
  function: full-sync/index.js
  web: 'yes'
  runtime: nodejs:24
  inputs:
    LOG_LEVEL: $LOG_LEVEL
  annotations:
    require-adobe-auth: true
    final: true
