# The [pre-app-build] hooks are auto-generated. Do not remove or manually edit.
hooks:
  pre-app-build: EXTENSION=extensibility/1 npx aio-commerce-lib-app hooks pre-app-build

operations:
  # These worker processes definitions are auto-generated. Do not remove or manually edit.
  workerProcess:
    - type: action
      impl: app-management/app-config
    - type: action
      impl: app-management/association
    - type: action
      impl: app-management/installation

runtimeManifest:
  packages:
    #  ingestion:
    #    license: Apache-2.0
    #    actions:
    #      $include: ./actions/ingestion/actions.config.yaml
    webhook:
      license: Apache-2.0
      actions:
        $include: ./actions/webhook/actions.config.yaml
    product-commerce:
      license: Apache-2.0
      actions:
        $include: ./actions/product/commerce/actions.config.yaml
    product-backoffice:
      license: Apache-2.0
      actions:
        $include: ./actions/product/external/actions.config.yaml
    customer-commerce:
      license: Apache-2.0
      actions:
        $include: ./actions/customer/commerce/actions.config.yaml
    customer-backoffice:
      license: Apache-2.0
      actions:
        $include: ./actions/customer/external/actions.config.yaml
    order-commerce:
      license: Apache-2.0
      actions:
        $include: ./actions/order/commerce/actions.config.yaml
    order-backoffice:
      license: Apache-2.0
      actions:
        $include: ./actions/order/external/actions.config.yaml
    stock-commerce:
      license: Apache-2.0
      actions:
        $include: ./actions/stock/commerce/actions.config.yaml
    stock-backoffice:
      license: Apache-2.0
      actions:
        $include: ./actions/stock/external/actions.config.yaml

    # This package definition is auto-generated. Do not remove or manually edit.
    app-management:
      license: Apache-2.0
      actions:
        app-config:
          function: .generated/actions/app-management/app-config.js
          web: yes
          runtime: nodejs:24
          inputs:
            LOG_LEVEL: $LOG_LEVEL
          annotations:
            final: true
            require-adobe-auth: true
        association:
          function: .generated/actions/app-management/association.js
          web: yes
          runtime: nodejs:24
          inputs:
            LOG_LEVEL: $LOG_LEVEL
          annotations:
            final: true
            require-adobe-auth: true
        installation:
          function: .generated/actions/app-management/installation.js
          web: yes
          runtime: nodejs:24
          inputs:
            LOG_LEVEL: $LOG_LEVEL
            AIO_COMMERCE_AUTH_IMS_CLIENT_ID: $AIO_COMMERCE_AUTH_IMS_CLIENT_ID
            AIO_COMMERCE_AUTH_IMS_CLIENT_SECRETS: $AIO_COMMERCE_AUTH_IMS_CLIENT_SECRETS
            AIO_COMMERCE_AUTH_IMS_TECHNICAL_ACCOUNT_ID: $AIO_COMMERCE_AUTH_IMS_TECHNICAL_ACCOUNT_ID
            AIO_COMMERCE_AUTH_IMS_TECHNICAL_ACCOUNT_EMAIL: $AIO_COMMERCE_AUTH_IMS_TECHNICAL_ACCOUNT_EMAIL
            AIO_COMMERCE_AUTH_IMS_ORG_ID: $AIO_COMMERCE_AUTH_IMS_ORG_ID
            AIO_COMMERCE_AUTH_IMS_SCOPES: $AIO_COMMERCE_AUTH_IMS_SCOPES
          annotations:
            final: true
            require-adobe-auth: true
          limits:
            timeout: 600000
