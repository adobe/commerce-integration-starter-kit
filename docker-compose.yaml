services:
  otel-lgtm:
    image: grafana/otel-lgtm:latest@sha256:10f48eb2f8670134df542177bb19536c55421b089e43f9dfc2a27d4c078204d8
    container_name: otel-lgtm
    restart: unless-stopped
    ports:
      - "3000:3000" # Grafana UI
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
    volumes:
      - "lgtm-data:/data" # Persist data across restarts
    networks: [telemetry]

  # Cloudflare Tunnel - Exposes collector for deployed actions
  cloudflared:
    image: cloudflare/cloudflared:latest@sha256:6b599ca3e974349ead3286d178da61d291961182ec3fe9c505e1dd02c8ac31b0
    container_name: cloudflared
    restart: unless-stopped
    networks: [telemetry]
    depends_on: [otel-lgtm]
    command:
      - "tunnel"
      - "--url"
      - "http://otel-lgtm:4318"

networks:
  telemetry:
    driver: bridge

volumes:
  lgtm-data: