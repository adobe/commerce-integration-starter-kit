services:
  otel-lgtm:
    image: grafana/otel-lgtm:0.29.1@sha256:b4da8bf6b1b44f6f683883869619eb9781465c642ce5f2d70591fb27094ddb1c
    container_name: otel-lgtm
    restart: unless-stopped
    ports:
      - "3000:3000" # Grafana UI
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
    volumes:
      - "lgtm-data:/data" # Persist data across restarts
    networks: [telemetry]

  # Cloudflare Tunnel - Exposes collector for deployed actions
  cloudflared:
    image: cloudflare/cloudflared:2026.7.3@sha256:e39ee8da81ad5e05d77f38d2f51c60ca51bf2a8450ac3abab50c17fdb91d91bf
    container_name: cloudflared
    restart: unless-stopped
    networks: [telemetry]
    depends_on: [otel-lgtm]
    command:
      - "tunnel"
      - "--url"
      - "http://otel-lgtm:4318"

networks:
  telemetry:
    driver: bridge

volumes:
  lgtm-data: