services:
  otel-lgtm:
    image: grafana/otel-lgtm:latest@sha256:764b657d5c750a151fbe2f9acd8cd8edeec873b8f5e3179380d7d08b69797c2e
    container_name: otel-lgtm
    restart: unless-stopped
    ports:
      - "3000:3000" # Grafana UI
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
    volumes:
      - "lgtm-data:/data" # Persist data across restarts
    networks: [telemetry]

  # Cloudflare Tunnel - Exposes collector for deployed actions
  cloudflared:
    image: cloudflare/cloudflared:latest@sha256:12ff5c6992a9863db4da270746af7c244bcaee49353039af8104268a18d6c4f0
    container_name: cloudflared
    restart: unless-stopped
    networks: [telemetry]
    depends_on: [otel-lgtm]
    command:
      - "tunnel"
      - "--url"
      - "http://otel-lgtm:4318"

networks:
  telemetry:
    driver: bridge

volumes:
  lgtm-data: